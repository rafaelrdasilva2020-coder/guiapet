// Fluxo: intro -> perguntas 0,1,2 -> pausa (break) -> perguntas 3,4 -> loading -> resultado
let answers = {};
let step = "intro"; // intro | q0..q4 | break | loading | result
let qIndex = 0;

const card = document.getElementById('card');
const tapeFill = document.getElementById('tapeFill');
const tapeLabel = document.getElementById('tapeLabel');
const tapeCaption = document.getElementById('tapeCaption');

const captions = [
  "Vamos tirar suas medidas de empreendedora pet",
  "Ajustando o corte para o seu perfil...",
  "Verificando a folga de tempo disponível...",
  "Quase na metade — respire e continue",
  "Conferindo seu histórico de vendas...",
  "Fechando o acabamento do seu perfil..."
];

function updateTape(pct, captionIdx){
  tapeFill.style.width = pct + '%';
  tapeLabel.textContent = Math.round(pct/2.7) + ' cm';
  tapeCaption.textContent = captions[Math.min(captionIdx, captions.length-1)];
}

function render(){
  if(step === "intro") return renderIntro();
  if(step === "break") return renderBreak();
  if(step === "loading") return renderLoading();
  if(step === "result") return renderResult();
  return renderQuestion();
}

function renderIntro(){
  updateTape(0, 0);
  card.innerHTML = `
    <img class="card-img" src="${IMG.hero}" alt="Guia Completo de Moda Pet aberto em tablet e celular">
    <div class="card-body intro-body">
      <div class="intro-eyebrow">Quiz rápido · 5 perguntas · 1 minuto</div>
      <h1 class="intro-title">Você tem o perfil pra transformar costura em renda com moda pet?</h1>
      <p class="intro-copy">Responda 5 perguntas rápidas sobre você e descubra o caminho mais indicado pra começar a vender roupinhas pet — mesmo que hoje você não saiba por onde começar.</p>
      <button class="start-btn" id="startBtn">Começar o quiz →</button>
      <p class="intro-meta">Leva menos de 1 minuto</p>
    </div>
  `;
  document.getElementById('startBtn').addEventListener('click', ()=>{
    if(typeof fbq === 'function'){ fbq('track', 'Lead', {content_name:'Quiz Moda Pet - Início'}); }
    step = "q0"; qIndex = 0; render();
  });
}

function renderQuestion(){
  qIndex = parseInt(step.replace('q',''));
  const item = questions[qIndex];
  updateTape(((qIndex+1)/questions.length)*100, qIndex+1);
  card.innerHTML = `
    <div class="card-body">
      <div class="step-eyebrow">${item.eyebrow}</div>
      <h1 class="q">${item.q}</h1>
      ${item.sub ? `<p class="q-sub">${item.sub}</p>` : ''}
      <div class="options" id="opts">
        ${item.options.map((opt,i)=>`
          <button class="opt" data-i="${i}">
            <span class="dot"></span><span>${opt}</span>
          </button>
        `).join('')}
      </div>
      <div class="nav-row">
        <button class="back-btn" id="backBtn" ${qIndex===0 ? 'disabled':''}>&larr; Voltar</button>
        <span class="counter">${qIndex+1} / ${questions.length}</span>
      </div>
    </div>
  `;
  document.querySelectorAll('.opt').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      answers[item.key] = item.options[btn.dataset.i];
      if(qIndex === 2){ step = "break"; }
      else if(qIndex + 1 < questions.length){ step = "q" + (qIndex+1); }
      else { step = "loading"; }
      render();
    });
  });
  const backBtn = document.getElementById('backBtn');
  backBtn.addEventListener('click', ()=>{
    if(qIndex>0){ step = "q" + (qIndex-1); render(); }
  });
}

function renderBreak(){
  updateTape(60, 3);
  card.innerHTML = `
    <img class="card-img short" src="${IMG.break1}" alt="Exemplo real de molde profissional incluso no guia">
    <div class="card-body break-body">
      <p class="break-quote">Este é um dos 100 moldes profissionais que você recebe — prontos pra imprimir e cortar.</p>
      <p class="break-sub">Faltam só 2 perguntas para o seu resultado</p>
      <button class="continue-btn" id="continueBtn">Continuar →</button>
    </div>
  `;
  document.getElementById('continueBtn').addEventListener('click', ()=>{
    step = "q3"; render();
  });
}

function renderLoading(){
  updateTape(100, 5);
  const goalText = (answers.goal || "").toLowerCase();
  const blockerText = answers.blocker || "";
  let personalized = "Montando seu perfil de costureira pet...";
  if(goalText.includes("negócio")){
    personalized = "Traçando seu caminho para montar um negócio de moda pet...";
  } else if(goalText.includes("renda extra")){
    personalized = "Calculando seu caminho mais rápido até a renda extra...";
  } else if(goalText.includes("hobby")){
    personalized = "Ajustando o guia para transformar seu hobby em renda...";
  }
  const subText = blockerText ? `Considerando que seu maior desafio é: "${blockerText}"` : "Isso leva só alguns segundos";
  card.innerHTML = `
    <div class="loading-screen">
      <div class="needle"></div>
      <div class="loading-text">${personalized}</div>
      <div class="loading-sub">${subText}</div>
    </div>
  `;
  setTimeout(()=>{ step = "result"; render(); }, 1900);
}
